<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>钟佳悦生日快乐</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background-color: #FFD700;
    text-align: center;
    transition: background-color 2s;
  }
  .cake {
    width: 200px;
    margin: 0 auto;
    background: #fff;
    border-radius: 100%;
    position: relative;
    padding-top: 20px;
    box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
  }
  .candle {
    width: 20px;
    height: 50px;
    background: #FFD700;
    border-radius: 100%;
    margin: 0 auto;
    position: relative;
    top: 20px;
  }
  .flame {
    width: 20px;
    height: 20px;
    background: #FFA500;
    border-radius: 100%;
    margin: 0 auto;
    position: relative;
    top: 5px;
    animation: flicker 1s infinite alternate;
  }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }
  .letter-before {
    margin-top: 20px;
    display: none;
    background-color: black;
    color: white;
    padding: 20px;
    white-space: pre-wrap;
  }
  .letter-after {
    margin-top: 20px;
    display: none;
    background-color: black;
    color: white;
    padding: 20px;
    white-space: pre-wrap;
  }
  .reveal {
    color: white;
    white-space: pre-wrap;
    overflow: hidden;
    font-size: 0;
    animation: revealText 5s steps(29, end) forwards;
  }
  @keyframes revealText {
    to {
      font-size: 16px;
    }
  }
  @media (max-width: 600px) {
    .cake, .candle, .flame {
      transform: scale(0.5);
    }
  }
</style>
</head>
<body>
<h1>钟佳悦生日快乐！</h1>
<div class="cake">
  <div class="candle">
    <div class="flame" id="flame"></div>
  </div>
</div>
<button onclick="revealBeforeLetter()">点亮蜡烛，阅读信件</button>
<div class="letter-before" id="letterBefore">
  <div class="reveal" id="revealBefore"></div>
</div>
<div class="letter-after" id="letterAfter">
  <div class="reveal" id="revealAfter"></div>
</div>
<audio id="hbdMusic" controls>
  <source src="hbd.mp3" type="audio/mpeg">
  您的浏览器不支持音频播放。
</audio>

<script>
  function revealBeforeLetter() {
    document.getElementById('letterBefore').style.display = 'block';
    var beforeLetterContent = "亲爱的钟佳悦：\n\n在你许愿之前，我想对你说，你的每一个生日都是特别的，因为你让这个世界变得更加美好。\n\n愿你的生活充满快乐和爱。\n\n你的朋友";
    var revealBeforeDiv = document.getElementById('revealBefore');
    revealBeforeDiv.textContent = beforeLetterContent;
    revealBeforeDiv.style.animation = 'revealText 5s steps(' + beforeLetterContent.length + ', end) forwards';
    revealBeforeDiv.addEventListener('animationend', function() {
      document.getElementById('message').style.display = 'block';
    });
  }

  function revealAfterLetter() {
    document.getElementById('letterAfter').style.display = 'block';
    var afterLetterContent = "亲爱的钟佳悦：\n\n现在你已经许下了愿望，我想对你说，无论你的愿望是什么，我都希望它能实现。\n\n你值得所有美好的事物。\n\n永远支持你的朋友";
    var revealAfterDiv = document.getElementById('revealAfter');
    revealAfterDiv.textContent = afterLetterContent;
    revealAfterDiv.style.animation = 'revealText 5s steps(' + afterLetterContent.length + ', end) forwards';
    revealAfterDiv.addEventListener('animationend', function() {
      document.getElementById('hbdMusic').play
      document.getElementById('hbdMusic').play();
    });
  }
</script>
</body>
</html>
